<div id="playerWhitelistModal" class="player-whitelist-modal hidden">

    <div class="player-whitelist-panel">

        <div class="player-whitelist-side-tabs">

            <button
                class="player-whitelist-tab active"
                type="button"
                data-tab="whitelist"
                title="白名單"
            >
                <img src="/static/icons/feature_button/paper.png" alt="">
                <span>白名單</span>
            </button>

            <button
                class="player-whitelist-tab"
                type="button"
                data-tab="history"
                title="白名單紀錄"
            >
                <img src="/static/icons/general_icon/list.png" alt="">
                <span>紀錄</span>
            </button>

            <button
                class="player-whitelist-tab"
                type="button"
                data-tab="help"
                title="白名單說明"
            >
                <img src="/static/icons/general_icon/knowledge_book.png" alt="">
                <span>說明</span>
            </button>

        </div>

        <div class="player-whitelist-main">

            <div id="playerWhitelistPage" class="player-whitelist-page">

                <div class="player-whitelist-header">

                    <div class="player-whitelist-header-main">

                        <div class="player-whitelist-title-row">
                            <div class="player-whitelist-title">
                                玩家白名單管理
                            </div>
                        </div>

                        <div class="player-whitelist-status-row">

                            <div class="player-whitelist-status-left">

                                <div
                                    id="playerWhitelistSummary"
                                    class="player-whitelist-summary"
                                ></div>

                                <div
                                    id="playerWhitelistPlayerCount"
                                    class="player-whitelist-player-count"
                                >
                                    載入中...
                                </div>

                            </div>

                            <div class="player-whitelist-switch-area">

                                <div class="player-whitelist-switch-group">

                                    <div class="player-whitelist-switch-title">
                                        白名單
                                    </div>

                                    <button
                                        id="whiteListToggleBtn"
                                        class="setting-switch-btn off"
                                        type="button"
                                        data-mc-tooltip="開啟後只有在白名單內的玩家能進入伺服器(管理員不再此限制內)。"
                                        
                                    >
                                        <span class="setting-switch-visual">
                                            <span class="setting-switch-track"></span>
                                            <span class="setting-switch-thumb"></span>
                                        </span>

                                        <span class="setting-switch-text">
                                            已關閉
                                        </span>

                                    </button>

                                </div>

                                <div class="player-whitelist-switch-group">

                                    <div class="player-whitelist-switch-title">
                                        強制執行白名單
                                    </div>

                                    <button
                                        id="enforceWhitelistToggleBtn"
                                        class="setting-switch-btn off"
                                        type="button"
                                        data-mc-tooltip="需開啟白名單才會生效，開啟後若沒有在白名單內的玩家會立刻被踢出伺服器。"
                                    >
                                        <span class="setting-switch-visual">
                                            <span class="setting-switch-track"></span>
                                            <span class="setting-switch-thumb"></span>
                                        </span>

                                        <span class="setting-switch-text">
                                            已關閉
                                        </span>

                                    </button>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <div class="player-whitelist-toolbar">

                    <button
                        id="openAddWhitelistPlayerBtn"
                        class="player-whitelist-add-open-btn"
                        type="button"
                    >
                        ＋ 新增玩家到白名單
                    </button>

                    <div class="player-permission-search-wrap">

                        <input
                            id="playerWhitelistSearchInput"
                            class="player-whitelist-search player-permission-search-input"
                            type="text"
                            placeholder="搜尋玩家名稱"
                        >

                        <button
                            id="playerWhitelistSearchBtn"
                            class="player-permission-search-btn"
                            type="button"
                            data-mc-tooltip="搜尋玩家"
                        >
                            <img
                                src="/static/icons/server_settings/spyglass.png"
                                alt="搜尋"
                            >
                        </button>

                    </div>

                </div>

                <div
                    id="playerWhitelistList"
                    class="player-whitelist-list"
                >
                    <div class="player-whitelist-empty">
                        尚未載入玩家資料
                    </div>
                </div>

            </div>

            <div id="playerWhitelistHistoryPage" class="player-whitelist-page hidden">

                <div class="player-whitelist-header">
                    <div class="player-whitelist-title-row">
                        <div id="playerWhitelistHistoryTitle" class="player-whitelist-title">
                            白名單管理：紀錄
                        </div>
                    </div>
                </div>

                <div class="player-whitelist-history-toolbar">

                    <div class="player-permission-search-wrap">

                        <input
                            id="playerWhitelistHistorySearchInput"
                            class="player-whitelist-search player-permission-search-input"
                            type="text"
                            placeholder="搜尋白名單紀錄"
                        >

                        <button
                            id="playerWhitelistHistoryTimeBtn"
                            class="filter-btn player-permission-history-time-btn player-whitelist-history-icon-btn"
                            type="button"
                            data-mc-tooltip="時間篩選"
                        >
                            <img
                                src="/static/icons/general_icon/clock.gif"
                                alt="時間篩選"
                            >
                        </button>

                        <div
                            id="playerWhitelistHistoryTimeMenu"
                            class="filter-menu player-permission-history-time-menu hidden"
                        >
                            <div class="filter-title">
                                時間篩選
                            </div>

                            <div class="permission-time-filter-row">
                                <label>開始時間</label>

                                <input
                                    id="playerWhitelistHistoryStartTime"
                                    class="permission-time-filter-input mc-input"
                                    type="text"
                                    placeholder="開始時間"
                                >
                            </div>

                            <div class="permission-time-filter-row">
                                <label>結束時間</label>

                                <input
                                    id="playerWhitelistHistoryEndTime"
                                    class="permission-time-filter-input mc-input"
                                    type="text"
                                    placeholder="結束時間"
                                >
                            </div>

                            <div class="permission-time-apply-row">
                                <button
                                    id="playerWhitelistHistoryApplyTimeBtn"
                                    type="button"
                                    class="filter-clear-btn permission-time-apply-btn"
                                >
                                    <img
                                        src="/static/icons/general_icon/clock.gif"
                                        alt=""
                                    >

                                    <span>套用篩選</span>
                                </button>
                            </div>

                            <div class="filter-title">
                                快速選擇
                            </div>

                            <div class="filter-tags">
                                <button
                                    type="button"
                                    data-time-range="today"
                                >
                                    今天
                                </button>

                                <button
                                    type="button"
                                    data-time-range="7d"
                                >
                                    近7天
                                </button>

                                <button
                                    type="button"
                                    data-time-range="30d"
                                >
                                    近30天
                                </button>
                            </div>

                            <div class="filter-actions">
                                <button
                                    id="playerWhitelistHistoryClearTimeBtn"
                                    type="button"
                                    class="filter-clear-btn"
                                >
                                    <img
                                        src="/static/icons/general_icon/brush.png"
                                        alt="清除篩選"
                                    >

                                    <span>清除篩選</span>
                                </button>
                            </div>
                        </div>

                        <button
                            id="playerWhitelistHistoryFilterBtn"
                            class="filter-btn player-permission-history-filter-btn player-whitelist-history-icon-btn"
                            type="button"
                            data-mc-tooltip="篩選紀錄"
                        >
                            <img
                                src="/static/icons/general_icon/hopper.png"
                                alt="篩選"
                            >
                        </button>

                        <div
                            id="playerWhitelistHistoryFilterMenu"
                            class="filter-menu hidden"
                        >
                            <div class="filter-title">
                                操作
                            </div>

                            <div class="filter-tags">
                                <button
                                    type="button"
                                    data-filter="add"
                                >
                                    加入白名單
                                </button>

                                <button
                                    type="button"
                                    data-filter="remove"
                                >
                                    移出白名單
                                </button>
                            </div>

                            <div class="filter-title">
                                操作來源
                            </div>

                            <div class="filter-tags">
                                <button type="button" data-filter="oxocraft">
                                    OxOcraft
                                </button>

                                <button type="button" data-filter="minecraft_sync">
                                    Minecraft資料同步
                                </button>

                                <button type="button" data-filter="system">
                                    系統
                                </button>

                                <button type="button" data-filter="rcon">
                                    UI輸入指令
                                </button>

                                <button type="button" data-filter="command">
                                    遊戲內指令
                                </button>
                            </div>

                            <div class="filter-actions">
                                <button
                                    type="button"
                                    data-filter="clear"
                                    class="filter-clear-btn"
                                >
                                    <img
                                        src="/static/icons/general_icon/brush.png"
                                        alt="清除篩選"
                                    >

                                    <span>清除篩選</span>
                                </button>
                            </div>
                        </div>

                        <button
                            id="playerWhitelistHistorySearchBtn"
                            class="player-permission-search-btn player-permission-history-search-btn player-whitelist-history-icon-btn"
                            type="button"
                            data-mc-tooltip="搜尋紀錄"
                        >
                            <img
                                src="/static/icons/server_settings/spyglass.png"
                                alt="搜尋"
                            >
                        </button>

                    </div>

                </div>

                <div id="playerWhitelistHistoryList" class="player-whitelist-history-list">
                    <div class="player-whitelist-empty">尚未載入白名單紀錄</div>
                </div>

            </div>

            <div id="playerWhitelistHelpPage" class="player-whitelist-page hidden">

                <div class="player-whitelist-header">
                    <div class="player-whitelist-title-row">
                        <div class="player-whitelist-title">
                            白名單管理：說明
                        </div>
                    </div>
                </div>

                <div id="playerWhitelistHelpContent" class="player-whitelist-help"></div>

            </div>

        </div>

    </div>

    <div
        id="addWhitelistPlayerModal"
        class="add-whitelist-player-modal hidden"
    >

        <div class="add-whitelist-player-panel">

            <div class="add-whitelist-player-header">

                <div class="add-whitelist-player-title">
                    新增玩家到白名單
                </div>

            </div>

            <div class="add-whitelist-player-input-row">

                <div class="add-op-player-search-wrap">

                    <input
                        id="addWhitelistPlayerInput"
                        class="player-whitelist-search add-op-player-search-input"
                        type="text"
                        placeholder="請輸入玩家名稱"
                    >

                    <button
                        id="confirmAddWhitelistPlayerBtn"
                        class="add-op-search-btn"
                        type="button"
                        data-mc-tooltip="搜尋玩家"
                    >
                        <img
                            src="/static/icons/server_settings/spyglass.png"
                            alt="搜尋"
                        >
                    </button>

                </div>

            </div>

            <div class="add-whitelist-player-subtitle">
                之前加入過的玩家
            </div>

            <div
                id="whitelistCandidateList"
                class="whitelist-candidate-list"
            >
                <div class="player-whitelist-empty">
                    尚未載入玩家資料
                </div>
            </div>

        </div>

    </div>

</div>
