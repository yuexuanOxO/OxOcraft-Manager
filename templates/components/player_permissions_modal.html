<div id="playerPermissionModal" class="player-permission-modal hidden">
    <div class="player-permission-panel">

        <div class="player-permission-tabs">
            <button
                id="openPermissionHelpBtn"
                class="player-permission-tab-btn"
                type="button"
            >
                <img src="/static/icons/player_whitelist/knowledge_book.png">
            </button>
        </div>

        <div class="player-permission-header">
            <div class="player-permission-header-main"><div>
                <div class="player-permission-title-row">
                    <div class="player-permission-title">
                        玩家權限管理
                    </div>
                </div>
                <div id="playerPermissionSummary" class="player-permission-summary">
                </div>

                <div id="playerPermissionPlayerCount"
                    class="player-permission-player-count">
                    載入中...
                </div>
            </div>

            <!-- <button id="closePlayerPermissionBtn" class="player-permission-close-btn" type="button">
                ✕
            </button> -->
                
            </div>
            
        </div>

        <div class="player-permission-toolbar">

            <button id="openAddOpPlayerBtn" class="player-permission-add-open-btn" type="button">
                + 新增玩家到管理員
            </button>

            <input
                id="playerPermissionSearchInput"
                class="player-permission-search"
                type="text"
                placeholder="搜尋玩家名稱或 UUID"
            >

            <button id="refreshPlayerPermissionBtn" class="player-permission-refresh-btn" type="button">
                重新整理
            </button>
        </div>

        <div id="playerPermissionList" class="player-permission-list">
            <div class="player-permission-empty">尚未載入玩家資料</div>
        </div>

    </div>

    <div id="addOpPlayerModal" class="add-op-player-modal hidden">
        <div class="add-op-player-panel">
            <div class="add-op-player-header">
                <div class="add-op-player-title">新增玩家到管理員</div>
                <button id="closeAddOpPlayerBtn" class="player-permission-close-btn" type="button">✕</button>
            </div>

            <div class="add-op-player-input-row">
                <input
                    id="addOpPlayerInput"
                    class="player-permission-search"
                    type="text"
                    placeholder="請輸入玩家名稱"
                >

                <button id="confirmAddOpPlayerBtn" class="player-permission-action normal" type="button">
                    加入
                </button>
            </div>

            <div class="add-op-player-subtitle">之前加入過的玩家</div>

            <div id="opCandidateList" class="op-candidate-list">
                <div class="player-permission-empty">尚未載入玩家資料</div>
            </div>
        </div>
    </div>

    <div id="playerPermissionTooltip" class="player-permission-tooltip hidden">
        權限管理說明
    </div>

</div>
