<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxO_MCServerManager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>OxO_MCServerManager</h1>
        <p class="subtitle">Minecraft Server Log Viewer</p>
        <div class="top-actions">
        </div>

        <div class="layout">

            <!-- 左邊功能區 -->
            <div class="side-panel">
                <div class="feature-grid">
                    <div class="feature-header">功能</div>

                    <div class="feature-item">
                        <button class="feature-btn" type="button">
                            <img src="{{ url_for('static', filename='icons/Recovery Compass.gif') }}" alt="死亡紀錄">
                        </button>

                        <div class="feature-hover-card">
                            <div class="feature-hover-head">
                                <div class="feature-hover-title">死亡紀錄</div>
                            </div>

                            <div class="feature-hover-desc">
                                紀錄玩家死亡時的位置、死亡原因、攻擊者，以及當時使用的武器或相關資訊。
                            </div>
                        </div>
                    </div>

                </div>
            </div>

           
            <!-- 中間 Log -->
            <div class="panel">
                <div class="panel-header">
                    <div class="status-group">
                        <span id="statusLight" class="status-light {{ 'online' if server_online else 'offline' }}"></span>
                        <span id="statusText">{{ '在線' if server_online else '離線' }}</span>
                    </div>
                    <button id="powerBtn" class="power-btn">⏻</button>
                </div>

                <pre id="logBox">{{ logs }}</pre>

                <div class="command-bar">
                    <input id="commandInput" placeholder="輸入Minecraft指令">
                    <button id="sendCommandBtn">送出</button>
                </div>
            </div>

             <!-- 右邊 Players -->
            <div class="players-panel">
                <div class="players-header">Players</div>
                <div id="playersList" class="players-list"></div>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
