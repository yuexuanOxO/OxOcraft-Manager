<div id="playerWhitelistModal" class="player-whitelist-modal hidden">
    <div class="player-whitelist-panel">

        <div class="player-whitelist-header">
            <div>
                <div class="player-whitelist-title">玩家白名單管理</div>

                <div id="playerWhitelistSummary" class="player-whitelist-summary">
                </div>

                <div id="playerWhitelistPlayerCount" class="player-whitelist-player-count">
                    載入中...
                </div>
            </div>

            <button id="closePlayerWhitelistBtn" class="player-whitelist-close-btn" type="button">
                ✕
            </button>
        </div>

        <div class="player-whitelist-toolbar">
            <button id="openAddWhitelistPlayerBtn" class="player-whitelist-add-open-btn" type="button">
                ＋ 新增玩家到白名單
            </button>

            <input
                id="playerWhitelistSearchInput"
                class="player-whitelist-search"
                type="text"
                placeholder="搜尋白名單玩家名稱或 UUID"
            >

            <button id="refreshPlayerWhitelistBtn" class="player-whitelist-refresh-btn" type="button">
                重新整理
            </button>
        </div>

        <div id="playerWhitelistList" class="player-whitelist-list">
            <div class="player-whitelist-empty">尚未載入玩家資料</div>
        </div>

    </div>


    <div id="addWhitelistPlayerModal" class="add-whitelist-player-modal hidden">
        <div class="add-whitelist-player-panel">
            <div class="add-whitelist-player-header">
                <div class="add-whitelist-player-title">新增玩家到白名單</div>
                <button id="closeAddWhitelistPlayerBtn" class="player-whitelist-close-btn" type="button">✕</button>
            </div>

            <div class="add-whitelist-player-input-row">
                <input
                    id="addWhitelistPlayerInput"
                    class="player-whitelist-search"
                    type="text"
                    placeholder="請輸入玩家名稱"
                >

                <button id="confirmAddWhitelistPlayerBtn" class="player-whitelist-action normal" type="button">
                    加入
                </button>
            </div>

            <div class="add-whitelist-player-subtitle">之前加入過的玩家</div>

            <div id="whitelistCandidateList" class="whitelist-candidate-list">
                <div class="player-whitelist-empty">尚未載入玩家資料</div>
            </div>
        </div>
    </div>


</div>
