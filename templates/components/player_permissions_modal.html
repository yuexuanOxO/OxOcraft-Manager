<div id="playerPermissionModal" class="player-permission-modal hidden">
    <div class="player-permission-panel">

        <div class="player-permission-side-tabs">

            <button
                class="player-permission-tab active"
                type="button"
                data-tab="permissions"
                title="管理員"
            >
                <img src="/static/icons/feature_button/command_block.gif" alt="">
                <span>管理員</span>
            </button>

            <button
                class="player-permission-tab"
                type="button"
                data-tab="history"
                title="權限紀錄"
            >
                <img src="/static/icons/general_icon/list.png" alt="">
                <span>紀錄</span>
            </button>

            <button
                class="player-permission-tab"
                type="button"
                data-tab="help"
                title="權限說明"
            >
                <img src="/static/icons/general_icon/knowledge_book.png" alt="">
                <span>說明</span>
            </button>

        </div>

        <div class="player-permission-main">

            <div id="playerPermissionPage" class="player-permission-page">

                <div class="player-permission-header">
                    <div class="player-permission-header-main">
                        <div class="player-permission-title-row">
                            <div class="player-permission-title">
                                玩家權限管理
                            </div>
                        </div>

                        <div id="playerPermissionSummary" class="player-permission-summary"></div>

                        <div
                            id="playerPermissionPlayerCount"
                            class="player-permission-player-count"
                        >
                            載入中...
                        </div>
                    </div>
                </div>

                <div class="player-permission-toolbar">

                    <button
                        id="openAddOpPlayerBtn"
                        class="player-permission-add-open-btn"
                        type="button"
                    >
                        + 新增玩家到管理員
                    </button>

                    <input
                        id="playerPermissionSearchInput"
                        class="player-permission-search"
                        type="text"
                        placeholder="搜尋玩家名稱或 UUID"
                    >

                </div>

                <div id="playerPermissionList" class="player-permission-list">
                    <div class="player-permission-empty">尚未載入玩家資料</div>
                </div>

            </div>

            <div id="playerPermissionHistoryPage" class="player-permission-page hidden">

                <div class="player-permission-header">
                    <div class="player-permission-title-row">
                        <div id="playerPermissionHistoryTitle" class="player-permission-title">
                            權限管理：紀錄
                        </div>
                    </div>
                </div>

                <div class="player-permission-history-toolbar">

                    <input
                        id="playerPermissionHistorySearchInput"
                        class="player-permission-search"
                        type="text"
                        placeholder="搜尋權限管理紀錄"
                    >

                    <div class="filter-wrap">
                        <button
                            id="playerPermissionHistoryFilterBtn"
                            class="filter-btn"
                            type="button"
                            title="篩選紀錄"
                        >
                            <img
                                src="/static/icons/general_icon/hopper.png"
                                alt="篩選"
                            >
                        </button>

                        <div
                            id="playerPermissionHistoryFilterMenu"
                            class="filter-menu hidden"
                        >
                            <div class="filter-title">
                                操作
                            </div>

                            <div class="filter-tags">
                                <button type="button" data-filter="add">
                                    加入管理員
                                </button>

                                <button type="button" data-filter="remove">
                                    移除管理員
                                </button>
                            </div>

                            <div class="filter-title">
                                操作來源
                            </div>

                            <div class="filter-tags">
                                <button type="button" data-filter="oxocraft">OxOcraft</button>
                                <button type="button" data-filter="minecraft_sync">Minecraft資料同步</button>
                                <button type="button" data-filter="rcon">UI輸入指令</button>
                                <button type="button" data-filter="command">遊戲內指令</button>
                                <button type="button" data-filter="system">系統</button>
                            </div>

                            <div class="filter-actions">
                                <button
                                    type="button"
                                    data-filter="clear"
                                    class="filter-clear-btn"
                                >
                                    <img
                                        src="/static/icons/general_icon/brush.png"
                                        alt="清除篩選"
                                    >

                                    <span>清除篩選</span>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>

                <div id="playerPermissionHistoryList" class="player-permission-history-list">
                    <div class="player-permission-empty">尚未載入權限管理紀錄</div>
                </div>

            </div>

            <div id="playerPermissionHelpPage" class="player-permission-page hidden">

                <div class="player-permission-header">
                    <div class="player-permission-title-row">
                        <div class="player-permission-title">
                            權限管理：說明
                        </div>
                    </div>
                </div>

                <div id="playerPermissionHelpContent" class="player-permission-help"></div>

            </div>

        </div>

    </div>

    <div id="addOpPlayerModal" class="add-op-player-modal hidden">
        <div class="add-op-player-panel">
            <div class="add-op-player-header">
                <div class="add-op-player-title">新增玩家到管理員</div>
                <button id="closeAddOpPlayerBtn" class="player-permission-close-btn" type="button">✕</button>
            </div>

            <div class="add-op-player-input-row">
                <input
                    id="addOpPlayerInput"
                    class="player-permission-search"
                    type="text"
                    placeholder="請輸入玩家名稱"
                >

                <button id="confirmAddOpPlayerBtn" class="player-permission-action normal" type="button">
                    加入
                </button>
            </div>

            <div class="add-op-player-subtitle">之前加入過的玩家</div>

            <div id="opCandidateList" class="op-candidate-list">
                <div class="player-permission-empty">尚未載入玩家資料</div>
            </div>
        </div>
    </div>
</div>
