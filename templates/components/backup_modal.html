<div id="backupModal" class="backup-modal hidden">
    <div class="backup-panel">
        <div class="backup-header">
            <div class="backup-title">備份管理</div>
        </div>

        <div class="backup-tabs">
            <button class="backup-tab active" type="button" data-tab="manual">手動備份</button>
            <button class="backup-tab" type="button" data-tab="settings">自動備份</button>
            <button class="backup-tab" type="button" data-tab="records">備份紀錄</button>
            <button class="backup-tab" data-tab="cloud">雲端備份</button>
        </div>

        <div id="backupManualPage" class="backup-page">
            <div class="backup-row">
                <div class="backup-label">伺服器世界路徑</div>

                <div class="backup-path-wrap" data-path-row="manual-source">
                    <div id="manualBackupSourceText" class="backup-path-text"></div>
                    <input id="manualBackupSourceInput" class="backup-path-input hidden" type="text" value="">
                    <button class="backup-path-edit-btn" type="button" data-target="manual-source">✎</button>
                </div>
            </div>

            <div class="backup-row">
                <div class="backup-label">備份輸出路徑</div>

                <div class="backup-path-wrap" data-path-row="manual-backup">
                    <div id="manualBackupRootText" class="backup-path-text"></div>
                    <input id="manualBackupRootInput" class="backup-path-input hidden" type="text" value="">
                    <button class="backup-path-edit-btn" type="button" data-target="manual-backup">✎</button>
                </div>
            </div>

            <div class="backup-row">
                <div class="backup-label">目前世界</div>
                <div id="manualBackupWorldInfo" class="backup-value">請選擇世界資料夾</div>
            </div>

            <div id="manualBackupWorldList" class="manual-world-list"></div>

            <div class="backup-actions">
                <button id="manualLocalBackupBtn" type="button">開始本機備份</button>
                <button id="manualLocalCloudBackupBtn" type="button">開始本機&雲端備份</button>
            </div>

        </div>

        <div id="backupSettingsPage" class="backup-page hidden">
            <div class="backup-row">
                <div class="backup-label">伺服器世界路徑</div>

                <div class="backup-path-display" data-path-row="source">
                    <div id="backupSourceRootText" class="backup-value"></div>
                    <input id="backupSourceRootInput" class="backup-path-input hidden" type="text" value="">
                </div>
            </div>

            <div class="backup-row">
                <div class="backup-label">備份輸出路徑</div>

                <div class="backup-path-wrap" data-path-row="backup">
                    <div id="backupRootText" class="backup-path-text"></div>
                    <input id="backupRootInput" class="backup-path-input hidden" type="text" value="">
                    <button class="backup-path-edit-btn" type="button" data-target="backup">✎</button>
                </div>
            </div>

            <div class="backup-row">
                <div class="backup-label">目前世界</div>
                <div id="backupMapName" class="backup-value">讀取中...</div>
            </div>

            <div class="auto-backup-box">
                <div class="auto-backup-title">自動備份</div>

                <div class="backup-row">
                    <div class="backup-label">啟用自動備份</div>
                    <button id="autoBackupEnabledBtn" class="setting-bool-btn false" type="button" data-value="false">
                        False
                    </button>
                </div>

                <div class="backup-row">
                    <div class="backup-label">備份週期</div>
                    <select id="autoBackupFrequency" class="setting-input">
                        <option value="daily">每日</option>
                        <option value="weekly">每週</option>
                        <option value="monthly">每月</option>
                        <option value="yearly">每年</option>
                    </select>
                </div>

                <div class="backup-row">
                    <div class="backup-label">開始時間</div>
                    <input id="autoBackupStartAt" class="setting-input" type="datetime-local">
                </div>

                <div class="backup-row">
                    <div class="backup-label">本機完成後上傳雲端</div>
                    <button id="autoBackupUploadCloudBtn" class="setting-bool-btn false" type="button" data-value="false">
                        False
                    </button>
                </div>

                <div class="backup-row">
                    <div class="backup-label">下次備份</div>
                    <div id="autoBackupNextRunText" class="backup-value">未啟用</div>
                </div>

                <div class="backup-actions">
                    <button id="autoBackupSaveBtn" type="button">儲存自動備份設定</button>
                </div>
            </div>

            <div class="backup-actions">
                <button id="backupMainActionBtn" type="button" data-mode="start">立即備份</button>
            </div>

            <div class="backup-status-box">
                <div id="backupStatusText">狀態：待機</div>

                <div class="backup-progress-wrap">
                    <div id="backupProgressBar" class="backup-progress-bar"></div>
                </div>

                <div id="backupProgressText" class="backup-progress-text">0%</div>
                <div id="backupCurrentFile" class="backup-current-file">目前檔案：無</div>
            </div>
            
        </div>

        <div id="backupRecordsPage" class="backup-page hidden">
            <div class="backup-record-actions">
                <div class="backup-record-toolbar">
                    <input
                        id="backupRecordSearchInput"
                        class="backup-record-search-input"
                        type="text"
                        placeholder="搜尋：世界名稱、帳號、檔名..."
                    >

                    <button id="backupRecordSearchBtn" class="backup-icon-btn" type="button" title="搜尋">
                        <img src="/static/icons/backup/spyglass.png" alt="搜尋">
                    </button>

                    <button id="backupRecordFilterBtn" class="backup-icon-btn" type="button" title="篩選">
                        <img src="/static/icons/backup/hopper.png" alt="篩選">
                    </button>

                    <button id="backupRefreshRecordsBtn" class="backup-icon-btn" type="button" title="重新整理紀錄">
                        <img src="/static/icons/backup/refresh.png" alt="重新整理">
                    </button>

                    <div id="backupRecordFilterPanel" class="backup-filter-panel hidden">
                        <div class="backup-filter-title">來源</div>

                        <div class="backup-provider-filter-row">
                            <button class="backup-filter-chip" type="button" data-filter-provider="local">
                                <img class="backup-provider-img-icon" src="/static/icons/backup/grass_block.ico" alt="本機">
                                <span>本機</span>
                            </button>

                            <button class="backup-filter-chip" type="button" data-filter-provider="google_drive">
                                <img class="backup-provider-img-icon" src="/static/icons/backup/google_drive.ico" alt="Google Drive">
                                <span>Google Drive</span>
                            </button>
                        </div>

                        <div class="backup-filter-title">狀態</div>

                        <div class="backup-status-filter-row">
                            <button class="backup-filter-chip" type="button" data-filter-status="success">成功</button>
                            <button class="backup-filter-chip" type="button" data-filter-status="failed">失敗</button>
                            <button class="backup-filter-chip" type="button" data-filter-status="running">備份中</button>
                            <button class="backup-filter-chip" type="button" data-filter-status="canceled">已取消</button>
                        </div>

                        <div class="backup-filter-footer">
                            <button id="backupClearFiltersBtn" class="backup-clear-filter-btn" type="button" title="清除篩選">
                                <img src="/static/icons/backup/brush.png" alt="清除篩選">
                                <span>清除篩選</span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>

            <div id="backupRecordsList" class="backup-records-list">
                <div class="backup-empty">目前尚無備份紀錄</div>
            </div>
        </div>

        <div id="backupCloudPage" class="backup-page hidden">

            <div class="cloud-box">
                <div id="cloudStatusText">Google Drive：未連接</div>
                <div id="cloudEmailText"></div>

                <button id="cloudConnectBtn">連接 Google Drive</button>

                <div class="cloud-backup-folder-row">
                    <div class="cloud-backup-folder-label">指定備份資料夾</div>

                    <div class="cloud-backup-folder-wrap">
                        <div id="cloudBackupFolderText" class="cloud-backup-folder-text">
                            未指定，使用伺服器上次開啟的世界備份
                        </div>

                        <button id="cloudBackupFolderSelectBtn" class="backup-icon-btn" type="button" title="選擇備份資料夾">
                            <img src="/static/icons/backup/folder.png" alt="選擇資料夾">
                        </button>

                        <button id="cloudBackupFolderClearBtn" class="backup-icon-btn" type="button" title="清除指定資料夾">
                            <img src="/static/icons/backup/brush.png" alt="清除指定資料夾">
                        </button>
                    </div>
                </div>

                <button id="cloudUploadLatestBtn" type="button">上傳雲端備份</button>
                <div id="cloudUploadStatus"></div>

                <div class="backup-status-box cloud-upload-box">
                    <div id="cloudUploadFile">目前檔案：無</div>

                    <div class="backup-progress-wrap">
                        <div id="cloudUploadProgressBar" class="backup-progress-bar"></div>
                    </div>

                    <div id="cloudUploadProgressText" class="backup-progress-text">0%</div>
                </div>

            </div>

        </div>
    </div>

    <div id="manualBackupProgressBox" class="backup-status-box manual-floating-progress hidden">
        <div id="manualBackupStatusText">狀態：待機</div>

        <div class="manual-progress-row">
            <div class="backup-progress-wrap manual-progress-wrap">
                <div id="manualBackupProgressBar" class="backup-progress-bar"></div>
            </div>

            <div id="manualBackupProgressText" class="backup-progress-text manual-progress-text">0%</div>
        </div>
        <div id="manualBackupCurrentFile" class="backup-current-file">目前檔案：無</div>

        <div id="manualCloudUploadBox" class="manual-cloud-upload-box hidden">
            <div id="manualCloudUploadStatus">雲端上傳：待機</div>

            <div class="manual-progress-row">
                <div class="backup-progress-wrap manual-progress-wrap">
                    <div id="manualCloudUploadProgressBar" class="backup-progress-bar"></div>
                </div>

                <div id="manualCloudUploadProgressText"
                    class="backup-progress-text manual-progress-text">
                    0%
                </div>
            </div>

            <div id="manualCloudUploadFile" class="backup-current-file">
                目前檔案：無
            </div>
        </div>
        
    </div>

</div>
