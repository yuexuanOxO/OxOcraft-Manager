<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxO_MCServerManager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>OxO_MCServerManager</h1>
        <p class="subtitle">Minecraft Server Log Viewer</p>
        <div class="top-actions">
        </div>

        <div class="panel">
            <div class="panel-header">

                <div class="status-group">
                    <span id="statusLight" class="status-light {{ 'online' if server_online else 'offline' }}"></span>
                    <span id="statusText">{{ '在線' if server_online else '離線' }}</span>
                </div>
                <button id="powerBtn" class="power-btn" title="啟動 / 關閉伺服器">⏻</button>
            </div>
            
            <pre id="logBox">{{ logs }}</pre>

            <div class="command-bar">
                <input
                    type="text"
                    id="commandInput"
                    placeholder="輸入Minecraft指令"
                    autocomplete="off"
                >
                <button id="sendCommandBtn" type="button">送出</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
