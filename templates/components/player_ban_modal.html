<div id="playerBanModal" class="modal hidden">
    <div class="player-ban-panel">

        <div class="player-ban-side-tabs">
            <button class="player-ban-tab active" type="button" data-tab="players" title="封鎖玩家">
                <img src="/static/icons/feature_button/barrier.png" alt="">
                <span>封鎖玩家</span>
            </button>

            <button class="player-ban-tab" type="button" data-tab="ips" title="封鎖IP">
                <img src="/static/icons/feature_button/barrier.png" alt="">
                <span>封鎖IP</span>
            </button>

            <button class="player-ban-tab" type="button" data-tab="history" title="封鎖紀錄">
                <img src="/static/icons/general_icon/list.png" alt="">
                <span>封鎖紀錄</span>
            </button>

            <button class="player-ban-tab" type="button" data-tab="help" title="黑名單說明">
                <img src="/static/icons/general_icon/knowledge_book.png" alt="">
                <span>說明</span>
            </button>
        </div>

        <div class="player-ban-main">
            <div class="player-ban-header">
                <div class="player-ban-header-left">
                    <div id="playerBanSummary" class="player-ban-summary"></div>

                    <div id="playerBanPlayerCount" class="player-ban-player-count">
                        載入中...
                    </div>
                </div>

                <div id="playerBanTitle" class="player-ban-title">
                    黑名單管理：封鎖玩家
                </div>
            </div>

            <div id="playerBanToolbar" class="player-ban-toolbar">
                <button id="openAddBanBtn" class="player-ban-add-btn" type="button">
                    + 新增封鎖
                </button>

                <input
                    id="playerBanSearchInput"
                    class="player-ban-search"
                    type="text"
                    placeholder="搜尋"
                >
            </div>


            <div id="playerBanHistoryToolbar" class="player-ban-history-toolbar hidden">
                <input
                    id="playerBanHistorySearchInput"
                    class="player-ban-history-search"
                    type="text"
                    placeholder="搜尋封鎖紀錄"
                >

                <div class="filter-wrap">
                    <button
                        id="playerBanHistoryFilterBtn"
                        class="filter-btn"
                        type="button"
                        title="篩選封鎖紀錄"
                    >
                        <img src="/static/icons/general_icon/hopper.png" alt="">
                    </button>

                    <div id="playerBanHistoryFilterMenu" class="filter-menu hidden">
                        <div class="filter-title">類型</div>

                        <div class="filter-tags">
                            <button type="button" data-filter="player">封鎖玩家</button>
                            <button type="button" data-filter="ip">封鎖IP</button>
                        </div>

                        <div class="filter-title">操作</div>

                        <div class="filter-tags">
                            <button type="button" data-filter="add">封鎖</button>
                            <button type="button" data-filter="remove">解除封鎖</button>
                        </div>

                        <div class="filter-actions">
                            <button
                                type="button"
                                data-filter="clear"
                                class="filter-clear-btn"
                            >
                                <img src="/static/icons/general_icon/brush.png" alt="">
                                <span>清除篩選</span>
                            </button>
                        </div>
                    </div>
                </div>

            </div>


            <div id="playerBanContent" class="player-ban-content"></div>
        </div>

    </div>
</div>

<div id="addPlayerBanModal" class="modal hidden">
    <div class="player-ban-add-panel">

        <div class="player-ban-add-header">
            <div id="addPlayerBanTitle" class="player-ban-add-title">
                新增玩家黑名單
            </div>
        </div>

        <div class="player-ban-add-body">
            <div class="player-ban-candidate-title">玩家名稱</div>
            <div class="player-ban-input-row">
                <input
                    id="addPlayerBanTargetInput"
                    class="player-ban-add-input"
                    type="text"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    placeholder="請輸入玩家名稱"
                >

                <button
                    id="searchPlayerBanBtn"
                    class="player-ban-search-player-btn"
                    type="button"
                    title="搜尋玩家"
                >
                    <img
                        src="/static/icons/server_settings/spyglass.png"
                        alt="搜尋"
                    >
                </button>
            </div>

            <div id="playerBanCandidateSection" class="player-ban-candidate-section hidden">
                <div class="player-ban-candidate-title">
                    之前加入過的玩家
                </div>

                <div id="playerBanCandidateList" class="player-ban-candidate-list">
                    <div class="player-ban-empty">尚未載入玩家資料</div>
                </div>
            </div>

            <label class="player-ban-form-row">
                <span>封鎖原因</span>

                <textarea
                    id="addPlayerBanReasonInput"
                    class="player-ban-add-textarea"
                    rows="3"
                    placeholder="可留空，預設為已被管理員封鎖。"
                ></textarea>
            </label>

            <div class="player-ban-expire-box">
                <div class="player-ban-expire-title">封鎖期限</div>

                <div class="player-ban-expire-options">
                    <label class="player-ban-radio-row">
                        <input type="radio" name="playerBanExpireType" value="forever" checked>
                        <span>永久封鎖</span>
                    </label>

                    <label class="player-ban-radio-row">
                        <input type="radio" name="playerBanExpireType" value="duration">
                        <span>封鎖一段時間</span>
                    </label>

                    <label class="player-ban-radio-row">
                        <input type="radio" name="playerBanExpireType" value="datetime">
                        <span>封鎖到指定時間</span>
                    </label>
                </div>

                <div class="player-ban-expire-fields-slot">

                    <div id="playerBanDurationFields" class="player-ban-duration-fields hidden">
                        <input id="playerBanDaysInput" type="number" min="0" value="0">
                        <span>天</span>

                        <input id="playerBanHoursInput" type="number" min="0" value="0">
                        <span>小時</span>

                        <input id="playerBanMinutesInput" type="number" min="0" value="10">
                        <span>分鐘</span>
                    </div>

                    <div id="playerBanDateTimeFields" class="player-ban-datetime-fields hidden">
                        <input id="playerBanDateInput" type="date">
                        <input id="playerBanTimeInput" type="time">
                    </div>

                </div>

            </div>

            <div class="player-ban-add-actions">
                <button
                    id="confirmAddPlayerBanBtn"
                    class="player-ban-confirm-add-btn"
                    type="button"
                >
                    新增封鎖
                </button>
            </div>

        </div>

        

    </div>
</div>
