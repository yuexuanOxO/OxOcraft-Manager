
<!-- 暫停開發中 -->

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxO_MCServerManager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>


    <div id="deathBookModal" class="death-book-modal hidden">
        <div class="death-book-panel">

            <div class="death-book-inner">
                <div class="death-book-top">
                    <div class="death-book-player-block">
                        <img id="deathPlayerAvatar" class="death-book-avatar" src="" alt="player avatar">
                        <div id="deathPlayerName" class="death-book-player-name">Player</div>
                    </div>

                    <div id="deathPageInfo" class="death-book-page-info">Page 1 of 1 </div>
                </div>

                <div class="death-book-content">
                    <div class="death-book-section">
                        <div class="death-book-label">Recent death：</div>
                        <div id="deathText" class="death-book-text"></div>
                    </div>

                    <div class="death-book-section">
                        <div class="death-book-label">Location of death：</div>
                        <div id="deathLocation" class="death-book-text"></div>
                        <div id="deathTime" class="death-book-text"></div>
                    </div>

                    <div id="deathKillerSection" class="death-book-section">
                        <div class="death-book-label">killer：</div>
                        <div class="death-book-killer-row">
                            <img id="deathKillerIcon" class="death-book-killer-icon hidden" src="" alt="killer icon">
                            <div id="deathKillerText" class="death-book-text"></div>
                        </div>
                    </div>

                    <div id="deathWeaponSection" class="death-book-section">
                        <div class="death-book-label">item：</div>
                        <div id="deathWeaponText" class="death-book-text"></div>
                    </div>
                </div>

                <div class="death-book-nav">
                    <button id="deathPrevBtn" class="death-book-page-btn prev" type="button" aria-label="Previous Page"></button>
                    <button id="deathNextBtn" class="death-book-page-btn next" type="button" aria-label="Next page"></button>
                </div>
            </div>
        </div>
    </div>


    <div class="container">
        <h1>OxO_MCServerManager</h1>
        <p class="subtitle">Minecraft Server Log Viewer</p>
        <div class="top-actions">
        </div>

        <div class="layout">

            <!-- 左邊功能區 -->
            <div class="side-panel">
                <div class="feature-grid">
                    <div class="feature-header">Function</div>

                    <div class="feature-item">
                        <button id="deathRecordBtn" class="feature-btn" type="button">
                            <img src="{{ url_for('static', filename='icons/Recovery Compass.gif') }}" alt="Death Record">
                        </button>

                        <div class="feature-hover-card">

                            <div class="feature-title-box">
                                <div class="feature-title-left"></div>
                                <div class="feature-title-center"></div>
                                <div class="feature-title-right"></div>
                                <div class="feature-title-text">Death Record</div>
                            </div>

                            <div class="feature-desc-box">
                                <div class="feature-desc-left"></div>
                                <div class="feature-desc-center"></div>
                                <div class="feature-desc-right"></div>

                                <div class="feature-desc-text">
                                    Records information when a player dies.
                                </div>
                            </div>

                        </div>
                    </div>

                </div>
            </div>

           
            <!-- 中間 Log -->
            <div class="panel">
                <div class="panel-header">
                    <div class="status-group">
                        <span id="statusLight" class="status-light {{ 'online' if server_online else 'offline' }}"></span>
                        <span id="statusText">{{ 'online' if server_online else 'offline' }}</span>
                    </div>
                    <button id="powerBtn" class="power-btn">⏻</button>
                </div>

                <pre id="logBox">{{ logs }}</pre>

                <div class="command-bar">
                    <input id="commandInput" placeholder="輸入Minecraft指令">
                    <button id="sendCommandBtn">Send</button>
                </div>
            </div>

             <!-- 右邊 Players -->
            <div class="players-panel">
                <div class="players-header">Players</div>
                <div id="playersList" class="players-list"></div>
            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='main_en.js') }}"></script>
</body>
</html>
